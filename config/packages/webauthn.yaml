webauthn:
    credential_repository: App\Repository\WebAuthnCredentialFinder
    user_repository: App\Security\WebAuthnUserEntityRepository
    creation_profiles:
        default:
            rp:
                name: '%env(RELYING_PARTY_NAME)%'
                id: '%env(RELYING_PARTY_ID)%'
            authenticator_selection_criteria:
                user_verification: preferred
            attestation_conveyance: none
    request_profiles:
        default:
            rp_id: '%env(RELYING_PARTY_ID)%'
            user_verification: preferred
